name: Daily GitHub Trending Report

on:
  schedule:
    # 每天晚上 9:00 (UTC+8) 运行
    # UTC 时间 13:00 = 北京时间 21:00
    - cron: '0 13 * * *'
  workflow_dispatch:  # 允许手动触发

env:
  # 使用 Node.js 24，避免 Node 20 废弃警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Diagnose Coze API (Debug)
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        COZE_API_TOKEN: ${{ secrets.COZE_API_TOKEN }}
        COZE_BOT_ID: ${{ secrets.COZE_BOT_ID }}
        COZE_WORKFLOW_ID: ${{ secrets.COZE_WORKFLOW_ID }}
      run: python diagnose_coze.py

    - name: Run bot
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        COZE_API_TOKEN: ${{ secrets.COZE_API_TOKEN }}
        COZE_BOT_ID: ${{ secrets.COZE_BOT_ID }}
        COZE_WORKFLOW_ID: ${{ secrets.COZE_WORKFLOW_ID }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
      run: python main.py
